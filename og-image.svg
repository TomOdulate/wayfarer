<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080e1d"/>
      <stop offset="100%" stop-color="#0d1829"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b6ef5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b6ef5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow-l" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#5b6ef5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b6ef5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip"><rect width="1200" height="630"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-l)"/>
  <rect width="1200" height="630" fill="url(#glow-r)"/>

  <!-- Subtle grid dots -->
  <g clip-path="url(#clip)" opacity="0.07">
    <rect x="0"   y="0"   width="1200" height="630" fill="none"/>
    <!-- Grid pattern via repeated dots -->
    <g fill="#8fa3bf">
      <circle cx="60"  cy="60"  r="1.5"/> <circle cx="180" cy="60"  r="1.5"/> <circle cx="300" cy="60"  r="1.5"/>
      <circle cx="420" cy="60"  r="1.5"/> <circle cx="540" cy="60"  r="1.5"/> <circle cx="660" cy="60"  r="1.5"/>
      <circle cx="780" cy="60"  r="1.5"/> <circle cx="900" cy="60"  r="1.5"/> <circle cx="1020" cy="60" r="1.5"/>
      <circle cx="1140" cy="60" r="1.5"/>
      <circle cx="60"  cy="180" r="1.5"/> <circle cx="180" cy="180" r="1.5"/> <circle cx="300" cy="180" r="1.5"/>
      <circle cx="420" cy="180" r="1.5"/> <circle cx="540" cy="180" r="1.5"/> <circle cx="660" cy="180" r="1.5"/>
      <circle cx="780" cy="180" r="1.5"/> <circle cx="900" cy="180" r="1.5"/> <circle cx="1020" cy="180" r="1.5"/>
      <circle cx="1140" cy="180" r="1.5"/>
      <circle cx="60"  cy="300" r="1.5"/> <circle cx="180" cy="300" r="1.5"/> <circle cx="300" cy="300" r="1.5"/>
      <circle cx="420" cy="300" r="1.5"/> <circle cx="540" cy="300" r="1.5"/> <circle cx="660" cy="300" r="1.5"/>
      <circle cx="780" cy="300" r="1.5"/> <circle cx="900" cy="300" r="1.5"/> <circle cx="1020" cy="300" r="1.5"/>
      <circle cx="1140" cy="300" r="1.5"/>
      <circle cx="60"  cy="420" r="1.5"/> <circle cx="180" cy="420" r="1.5"/> <circle cx="300" cy="420" r="1.5"/>
      <circle cx="420" cy="420" r="1.5"/> <circle cx="540" cy="420" r="1.5"/> <circle cx="660" cy="420" r="1.5"/>
      <circle cx="780" cy="420" r="1.5"/> <circle cx="900" cy="420" r="1.5"/> <circle cx="1020" cy="420" r="1.5"/>
      <circle cx="1140" cy="420" r="1.5"/>
      <circle cx="60"  cy="540" r="1.5"/> <circle cx="180" cy="540" r="1.5"/> <circle cx="300" cy="540" r="1.5"/>
      <circle cx="420" cy="540" r="1.5"/> <circle cx="540" cy="540" r="1.5"/> <circle cx="660" cy="540" r="1.5"/>
      <circle cx="780" cy="540" r="1.5"/> <circle cx="900" cy="540" r="1.5"/> <circle cx="1020" cy="540" r="1.5"/>
      <circle cx="1140" cy="540" r="1.5"/>
    </g>
  </g>

  <!-- ── Left panel: compass icon ───────────────────────────── -->
  <!-- Compass outer rings -->
  <circle cx="300" cy="315" r="188" fill="none" stroke="#1b2d4a" stroke-width="2"
    stroke-dasharray="5 16" stroke-dashoffset="8"/>
  <circle cx="300" cy="315" r="148" fill="none" stroke="#0f1a2e" stroke-width="1.5"/>

  <!-- Cardinal ticks -->
  <line x1="300" y1="118" x2="300" y2="142" stroke="#5b6ef5" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="300" y1="488" x2="300" y2="512" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="488" y1="315" x2="512" y2="315" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="88"  y1="315" x2="112" y2="315" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>

  <!-- N needle (accent) -->
  <path d="M300,140 L316,317 L300,291 L284,317 Z" fill="url(#acc)"/>
  <!-- S needle (muted) -->
  <path d="M300,490 L284,313 L300,339 L316,313 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="2" stroke-linejoin="round"/>
  <!-- E needle (muted) -->
  <path d="M490,315 L298,331 L324,315 L298,299 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="2" stroke-linejoin="round"/>
  <!-- W needle (muted) -->
  <path d="M110,315 L302,299 L276,315 L302,331 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Hub -->
  <circle cx="300" cy="315" r="24" fill="url(#acc)"/>
  <circle cx="300" cy="315" r="10" fill="#0d1829"/>

  <!-- ── Divider ──────────────────────────────────────────── -->
  <line x1="540" y1="100" x2="540" y2="530" stroke="#1b2d4a" stroke-width="1.5"/>

  <!-- ── Right panel: text ───────────────────────────────── -->
  <!-- Version badge -->
  <rect x="620" y="172" width="70" height="26" rx="6" fill="#111f38" stroke="#1b2d4a" stroke-width="1"/>
  <text x="655" y="190" text-anchor="middle" fill="#5b6ef5"
    font-size="13" font-weight="600" letter-spacing="0.3">v1.2.0</text>

  <!-- App name -->
  <text x="620" y="268" fill="#e8edf5" font-size="82" font-weight="700" letter-spacing="-3">Wayfarer</text>

  <!-- Tagline -->
  <text x="620" y="320" fill="#8fa3bf" font-size="26" font-weight="400" letter-spacing="-0.3">Travel Route Planner</text>

  <!-- Feature pills -->
  <g transform="translate(620, 364)">
    <!-- Pill 1 -->
    <rect width="148" height="30" rx="15" fill="#111f38" stroke="#1b2d4a" stroke-width="1"/>
    <text x="74" y="20" text-anchor="middle" fill="#8fa3bf" font-size="13" font-weight="500">📍 Itinerary Builder</text>
    <!-- Pill 2 -->
    <rect x="160" width="162" height="30" rx="15" fill="#111f38" stroke="#1b2d4a" stroke-width="1"/>
    <text x="241" y="20" text-anchor="middle" fill="#8fa3bf" font-size="13" font-weight="500">✅ Compliance Lists</text>
    <!-- Pill 3 -->
    <rect x="334" width="136" height="30" rx="15" fill="#111f38" stroke="#1b2d4a" stroke-width="1"/>
    <text x="402" y="20" text-anchor="middle" fill="#8fa3bf" font-size="13" font-weight="500">🗺️ Multi-trip</text>
  </g>

  <!-- ── Bottom route strip ──────────────────────────────── -->
  <rect x="0" y="555" width="1200" height="75" fill="#0d1829"/>
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#1b2d4a" stroke-width="1"/>

  <!-- Route line -->
  <line x1="150" y1="593" x2="1050" y2="593" stroke="#273f6a" stroke-width="2"/>

  <!-- Stop 1 — London (start, accent) -->
  <circle cx="150" cy="593" r="8" fill="url(#acc)"/>
  <circle cx="150" cy="593" r="4" fill="#0d1829"/>
  <text x="150" y="616" text-anchor="middle" fill="#8fa3bf" font-size="12" font-weight="500">London</text>

  <!-- Stop 2 — Paris -->
  <circle cx="375" cy="593" r="6" fill="none" stroke="#455470" stroke-width="2"/>
  <circle cx="375" cy="593" r="2.5" fill="#455470"/>
  <text x="375" y="616" text-anchor="middle" fill="#455470" font-size="12">Paris</text>

  <!-- Stop 3 — Lyon -->
  <circle cx="600" cy="593" r="6" fill="none" stroke="#455470" stroke-width="2"/>
  <circle cx="600" cy="593" r="2.5" fill="#455470"/>
  <text x="600" y="616" text-anchor="middle" fill="#455470" font-size="12">Lyon</text>

  <!-- Stop 4 — Barcelona -->
  <circle cx="825" cy="593" r="6" fill="none" stroke="#455470" stroke-width="2"/>
  <circle cx="825" cy="593" r="2.5" fill="#455470"/>
  <text x="825" y="616" text-anchor="middle" fill="#455470" font-size="12">Barcelona</text>

  <!-- Stop 5 — Madrid (end, green) -->
  <circle cx="1050" cy="593" r="8" fill="#22c55e" opacity="0.9"/>
  <circle cx="1050" cy="593" r="4" fill="#0d1829"/>
  <text x="1050" y="616" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="500">Madrid</text>
</svg>
