<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141e35"/>
      <stop offset="100%" stop-color="#0d1829"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b6ef5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b6ef5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5b6ef5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#1b2d4a" stroke-width="2"
    stroke-dasharray="5 14" stroke-dashoffset="7"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="136" fill="none" stroke="#0f1a2e" stroke-width="1.5"/>

  <!-- Cardinal tick marks -->
  <line x1="256" y1="68"  x2="256" y2="88"  stroke="#5b6ef5" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="424" x2="256" y2="444" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="424" y1="256" x2="444" y2="256" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="68"  y1="256" x2="88"  y2="256" stroke="#273f6a" stroke-width="3" stroke-linecap="round"/>

  <!-- North needle (accent — pointing up) -->
  <path d="M256,88 L270,258 L256,234 L242,258 Z" fill="url(#acc)"/>

  <!-- South needle (muted — pointing down) -->
  <path d="M256,424 L242,254 L256,278 L270,254 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- East needle (muted — pointing right) -->
  <path d="M424,256 L254,270 L278,256 L254,242 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- West needle (muted — pointing left) -->
  <path d="M88,256 L258,242 L234,256 L258,270 Z" fill="#1b2d4a" stroke="#273f6a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="22" fill="url(#acc)"/>
  <circle cx="256" cy="256" r="9"  fill="#0d1829"/>
</svg>
