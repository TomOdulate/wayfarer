<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b6ef5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Compass needle — north (light) -->
  <path d="M16,4 L18,16 L16,13 L14,16 Z" fill="white" opacity="0.95"/>

  <!-- Compass needle — south (translucent) -->
  <path d="M16,28 L14,16 L16,19 L18,16 Z" fill="white" opacity="0.35"/>

  <!-- East -->
  <path d="M28,16 L16,14 L19,16 L16,18 Z" fill="white" opacity="0.35"/>

  <!-- West -->
  <path d="M4,16 L16,18 L13,16 L16,14 Z" fill="white" opacity="0.35"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="16" cy="16" r="1"   fill="url(#bg)"/>
</svg>
